name: Release

on:
  push:
    tags:
      - "release-v*"

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/dpeak0/listentogether-syncserver
  ALIYUN_REGISTRY: crpi-euihr92xl17baj83.cn-shenzhen.personal.cr.aliyuncs.com
  ALIYUN_IMAGE: crpi-euihr92xl17baj83.cn-shenzhen.personal.cr.aliyuncs.com/dpeak/listentogether-syncserver

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        id: vars
        env:
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          version="${GITHUB_REF_NAME#release-}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${version}"
            echo "${GHCR_IMAGE}:latest"
            if [ -n "${ALIYUN_REGISTRY_USERNAME}" ] && [ -n "${ALIYUN_REGISTRY_PASSWORD}" ]; then
              echo "${ALIYUN_IMAGE}:${version}"
              echo "${ALIYUN_IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ secrets.ALIYUN_REGISTRY_USERNAME != '' && secrets.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.vars.outputs.tags }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release asset exists
        run: test -f ListenTogether-SyncServer-Install.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ListenTogether-SyncServer-Install.sh
          fail_on_unmatched_files: true
          generate_release_notes: true
