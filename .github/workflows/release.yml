name: Release

on:
  push:
    tags:
      - 'release-v*'

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ListenTogether-SyncServer-Install.sh
          generate_release_notes: true
